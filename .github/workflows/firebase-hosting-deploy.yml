name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # reCAPTCHA v3 Standard site key (public – safe to embed in workflow)
          VITE_RECAPTCHA_SITE_KEY: 6Lc-vIosAAAAAPJ1NRFhFu43lldk12EAjgii-8Ke

      - name: Deploy Firestore rules and Storage rules
        run: |
          printf '%s' "$FIREBASE_SA_JSON" > "$RUNNER_TEMP/sa.json"
          npx firebase-tools@latest deploy --only firestore:rules,storage --project daiichitravel-f49fd
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAIICHITRAVEL_F49FD }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json

      - name: Deploy to Firebase Hosting (daiichitravel-f49fd.web.app)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAIICHITRAVEL_F49FD }}
          channelId: live
          projectId: daiichitravel-f49fd
