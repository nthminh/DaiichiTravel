name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_ONEPAY_MERCHANT: ${{ secrets.VITE_ONEPAY_MERCHANT }}
          VITE_ONEPAY_ACCESS_CODE: ${{ secrets.VITE_ONEPAY_ACCESS_CODE }}
          VITE_ONEPAY_HASH_KEY: ${{ secrets.VITE_ONEPAY_HASH_KEY }}

      # Add your hosting deploy step here (e.g. Vercel, Netlify, Supabase, etc.)
      # Example for Vercel:
      # - name: Deploy to Vercel
      #   run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
